<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>M-Hero Pages</title>
  <meta name="description" content="猛士汽车服务运营相关报告归档。">
  <style>
    :root {
      color-scheme: light;
      --text: #111827;
      --muted: #4b5563;
      --line: #e5e7eb;
      --accent: #2563eb;
      --soft: #f8fafc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f3f4f6;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.7;
    }
    main {
      max-width: 1040px;
      margin: 0 auto;
      padding: 48px 20px;
    }
    header {
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      letter-spacing: 0;
    }
    .subtitle {
      color: var(--muted);
      margin: 0;
    }
    .article-list {
      display: grid;
      gap: 16px;
    }
    article {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
    }
    article h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    article p {
      margin: 0 0 14px;
      color: var(--muted);
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .meta {
      font-size: 13px;
      color: var(--muted);
    }
    footer {
      margin-top: 40px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>M-Hero Pages</h1>
      <p class="subtitle">猛士汽车服务运营报告归档与客户声音分析文章库。</p>
    </header>

    <section class="article-list" aria-label="文章列表">
      <article>
        <div class="meta">2026-07-03 / 客户声音 / Q1-Q2 综合报告</div>
        <h2><a href="/articles/mengshi-q1-q2-customer-voice/">猛士汽车2026年Q1、Q2客户声音综合报告</a></h2>
        <p>聚焦交付、服务、售后、品质四大维度，包含全量客户声音AI梳理、管控分级、交叉分析和交付服务部视角总结。</p>
        <a href="/articles/mengshi-q1-q2-customer-voice/">阅读报告</a>
      </article>
    </section>

    <footer>
      报告作者：刘明轩-猛士汽车MKT&amp;销售服务部-服务运营<br>
      仓库：<a href="https://github.com/kaisonlau8/m-hero-pages.git">kaisonlau8/m-hero-pages.git</a>
    </footer>
  </main>
</body>
</html>
